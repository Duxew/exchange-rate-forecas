name: Testler

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bagimliliklari kur
        run: pip install -r requirements.txt

      - name: Testleri calistir
        run: python -m pytest -v
